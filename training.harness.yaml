# Harness configuration — all four participants
# Usage: python -m training.harness --config training.harness.yaml

server:
  host: "localhost"
  port: 8765

trainer:
  # Option A: Point to a pre-made curriculum file.
  #   Trainer loads it and waits. Type "start" in the TUI to begin.
  # Option B: Leave blank ("") — Trainer polls for a goal from the TUI input bar.
  #   - Type "goal: teach Kalvin about Mary had a little lamb" in the TUI
  #   - Or type a file path like "curricula/first-steps.md"
  curriculum_file: "curricula/first-steps.md"
  curricula_dir: "curricula"   # Directory for generated curriculum files
  max_reactive_rounds: 5
  # llm:                         # Uncomment to override defaults
  #   base_url: "https://open.bigmodel.cn/api/paas/v4"
  #   model: "glm-5.1"
  #   enabled: true              # auto-tune overrides this to false per session
  # API key is read from KALVIN_LLM_API_KEY env var — never put it here

participants:
  - role: trainee
    type: embedded
    class: KAgent

  - role: trainer
    type: embedded
    class: Trainer

  - role: supervisor
    type: client
    class: SlackParticipant

  - role: supervisor
    type: client
    class: TUIParticipant
