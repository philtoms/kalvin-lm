# GitHub Actions CI for kalvin.
#
# Provisions the data/tokenizer/ assets (cache-first, rebuild-on-miss) so the
# full NLP-tokenizer test suite runs with zero skips. See the companion doc:
#   provision-tokenizer-data/README.md
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded in-flight runs on the same ref to save CI minutes when
# commits land in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Full test suite ──────────────────────────────────────────────────────
  # With data/tokenizer/ present, the 46 requires_nlp_data-gated tests run
  # instead of skipping (see tests/conftest.py). The assets come from cache
  # when the rebuild pipeline is unchanged, or from a full rebuild on miss.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # catch hung rebuilds early (spaCy stage is CPU/network-heavy)
    env:
      # Resolve data assets to <checkout>/data — explicit beats relying on the
      # default relative-path resolution, and matches where the rebuild script
      # and the cache both place the files.
      KALVIN_DATA_DIR: ${{ github.workspace }}/data

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        # Installs uv and Python; enable-cache speeds up repeated dependency
        # installs and the spaCy model wheel download on cache-miss rebuilds.
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      # ── Restore tokenizer data (cache-first) ─────────────────────────────
      # Key on every source file that influences the build output. A change to
      # any pipeline script (or bumping .cache-version) invalidates the cache,
      # triggering a rebuild that then writes a fresh entry under the new key.
      - name: Restore tokenizer data
        id: cache-tokenizer
        uses: actions/cache@v4
        with:
          path: data/tokenizer
          key: tokenizer-data-${{ hashFiles('scripts/rebuild-tokenizer-data.sh', 'dev/nlp/train_tokenizer.py', 'dev/nlp/nlp_analyzer.py', 'dev/nlp/tag_vocab.py', 'dev/nlp/download_corpus.py', 'data/tokenizer/.cache-version') }}

      # ── Restore HuggingFace Hub cache (rebuild-only) ──────────────────────
      # Only needed on a cache miss.  Caches dataset metadata and file pointers
      # so the `datasets` library reuses prior fetches on the rebuild path,
      # reducing HuggingFace API calls (and rate-limit exposure).  A broad
      # restore key keeps the cache warm across corpus revisions.
      - name: Restore HuggingFace Hub cache
        if: steps.cache-tokenizer.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-hub-cache-${{ runner.os }}
          restore-keys: |
            hf-hub-cache-

      # ── Rebuild on cache miss ────────────────────────────────────────────
      # Only reached when the cache key changed or no entry exists yet.
      # Install BOTH extras: --extra corpus alone resolves to main+corpus and
      # drops pytest/ruff (dev lives under [project.optional-dependencies], not
      # a dependency-group).
      # The spaCy model download is wrapped in a retry loop because the model
      # host (GitHub Releases for the wheel) can be transiently unavailable.
      # The HF Hub cache above + these retries add headroom; the 20-minute
      # timeout is ample for the ~7–15 min rebuild.
      - name: Rebuild tokenizer data (cache miss)
        if: steps.cache-tokenizer.outputs.cache-hit != 'true'
        run: |
          uv sync --extra dev --extra corpus
          # uv-managed venvs ship without pip; spaCy's `download` invokes
          # `python -m pip`, so make pip available in the project venv first.
          uv pip install pip
          # Retry the spaCy model download up to 3 times (transient host errors).
          set +e
          for attempt in 1 2 3; do
            uv run python -m spacy download en_core_web_sm && break || sleep $((attempt * 10))
          done
          set -e
          # Verify the model actually installed — the loop above swallows the
          # final failure under `set +e`.
          uv run python -c "import spacy; spacy.load('en_core_web_sm')"
          bash scripts/rebuild-tokenizer-data.sh

      - name: Run tests
        run: uv run pytest

  # ── Lint (fast, independent of data assets) ───────────────────────────────
  # Hard gate: ruff check and ruff format --check must both pass.
  # Pre-existing lint/format debt was cleared in KB-215.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .
